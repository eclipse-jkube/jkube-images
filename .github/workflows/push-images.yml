name: Push Images

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: 'jkube-java'
            args: ''
          - name: 'jkube-java-25'
            args: ''
          - name: 'jkube-java-21'
            args: ''
          - name: 'jkube-java-17'
            args: ''
          - name: 'jkube-java-11'
            args: ''
          - name: 'jkube-jetty9'
            args: ''
          - name: 'jkube-karaf'
            args: ''
          - name: 'jkube-remote-dev'
            args: ''
          - name: 'jkube-tomcat9'
            args: --no-squash
          - name: 'jkube-tomcat'
            args: --no-squash
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install CEKit
        uses: cekit/actions-setup-cekit@v1.1.7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Get Tag
        id: get_version
        run: |
          export GITHUB_TAG=${GITHUB_REF/refs\/tags\//}
          echo "TAG=quay.io/jkube/${{ matrix.image.name }}:${GITHUB_TAG/v/}" >> $GITHUB_ENV
      - name: Build ${{ matrix.image.name }} (amd64)
        run: |
          echo "Building ${TAG}"
          cekit --descriptor ${{ matrix.image.name }}.yaml build docker ${{ matrix.image.args }} --tag="${TAG}"
      - name: Trivy vulnerability scan (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.TAG }}'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          format: 'table'
      - name: Trivy CRITICAL CVE gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.TAG }}'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}
      - name: Build and push multi-arch ${{ matrix.image.name }}
        run: |
          echo "Building and pushing multi-arch ${TAG}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --tag="${TAG}" \
            target/image
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.TAG }}'
          format: 'cyclonedx'
          output: '${{ matrix.image.name }}.sbom.json'
      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image.name }}
          path: '${{ matrix.image.name }}.sbom.json'

  create-release:
    name: Create Release with SBOMs
    needs: build-images
    runs-on: ubuntu-latest
    steps:
      - name: Download all SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true
      - name: Upload SBOMs as release assets
        uses: softprops/action-gh-release@v2
        with:
          files: '*.sbom.json'
