name: Build Images

on:
  pull_request:
  push:
    branches:
      - main

env:
  TAG: latest

jobs:
  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: 'jkube-java'
            args: ''
          - name: 'jkube-java-25'
            args: ''
          - name: 'jkube-java-21'
            args: ''
          - name: 'jkube-java-17'
            args: ''
          - name: 'jkube-java-11'
            args: ''
          - name: 'jkube-jetty9'
            args: ''
          - name: 'jkube-karaf'
            args: ''
          - name: 'jkube-remote-dev'
            args: ''
          - name: 'jkube-tomcat9'
            args: --no-squash
          - name: 'jkube-tomcat'
            args: --no-squash
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install CEKit
        uses: cekit/actions-setup-cekit@v1.1.7
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image.name }}
        run: |
          echo "Building quay.io/jkube/${{ matrix.image.name }}:${TAG}"
          cekit --descriptor ${{ matrix.image.name }}.yaml build docker ${{ matrix.image.args }} --tag="quay.io/jkube/${{ matrix.image.name }}:${TAG}"
      - name: Test
        if: success()
        run: |
          ./scripts/test-${{ matrix.image.name }}.sh
      - name: Trivy vulnerability scan (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'quay.io/jkube/${{ matrix.image.name }}:${{ env.TAG }}'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'
          format: 'table'
      - name: Trivy CRITICAL CVE gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'quay.io/jkube/${{ matrix.image.name }}:${{ env.TAG }}'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: 'quay.io/jkube/${{ matrix.image.name }}:${{ env.TAG }}'
          format: cyclonedx-json
          output-file: '${{ matrix.image.name }}.sbom.json'
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image.name }}
          path: '${{ matrix.image.name }}.sbom.json'
